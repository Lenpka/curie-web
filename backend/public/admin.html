<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Панель администратора — Curie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #0ea5e9;
      --accent-hover: #38bdf8;
      --error: #f87171;
      --radius: 12px;
    }
    body.theme-dark {
      --bg: #020617;
      --bg-card: #1e293b;
      --border: #1f2937;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --error: #f87171;
    }
    body.theme-light {
      --bg: #e2e8f0;
      --bg-card: #f8fafc;
      --border: #cbd5e1;
      --text: #0f172a;
      --text-muted: #475569;
      --error: #dc2626;
    }
    body {
      margin: 0;
      font-family: "Outfit", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
      transition: background 0.2s, color 0.2s;
    }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    h2 { font-size: 1.2rem; color: var(--text); }
    a { color: var(--accent-hover); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .msg { padding: 16px; border-radius: 12px; margin: 16px 0; }
    .msg.error { background: rgba(248,113,113,0.2); color: var(--error); }
    .msg.info { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--bg-card);
    }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); color: var(--text); }
    th { background: var(--bg-card); font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    .toolbar { display: flex; align-items: center; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
    .toolbar a, .toolbar button {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
      transition: border-color 0.2s;
    }
    .toolbar a:hover, .toolbar button:hover { border-color: var(--accent-hover); }
  </style>
</head>
<body class="theme-dark">
  <div class="container">
    <h1>Панель администратора</h1>
    <div class="toolbar">
      <a href="/">← На главную</a>
      <button type="button" id="btn-refresh">Обновить</button>
      <button type="button" id="admin-theme-toggle" title="Светлая/тёмная тема">🌙</button>
    </div>
    <div id="message"></div>

    <h2 style="margin-top: 32px;">Разметка (T<sub>C</sub>, сингония)</h2>
    <div class="toolbar">
      <button type="button" id="btn-download-labels-csv">Скачать CSV</button>
    </div>
    <div id="labels-table-wrap"></div>

    <h2 style="margin-top: 32px;">Классификации (тип магнетизма)</h2>
    <div class="toolbar">
      <button type="button" id="btn-download-classify-csv">Скачать CSV</button>
    </div>
    <div id="classify-table-wrap"></div>
  </div>
  <script>
    const fetchOpts = { credentials: "include" };

    function showMsg(text, type) {
      const el = document.getElementById("message");
      el.className = "msg " + (type || "info");
      el.textContent = text;
      el.style.display = "block";
    }

    function renderLabelsTable(labels) {
      const wrap = document.getElementById("labels-table-wrap");
      if (!labels || labels.length === 0) {
        wrap.innerHTML = "<p class=\"msg info\">Записей пока нет.</p>";
        return;
      }
      let html = "<table><thead><tr><th>Формула</th><th>T<sub>C</sub> (K)</th><th>Сингония</th><th>Источник</th><th>Комментарий</th><th>Дата</th></tr></thead><tbody>";
      labels.forEach((r) => {
        html += "<tr><td>" + escapeHtml(r.formula) + "</td><td>" + (r.curieTcK != null ? Number(r.curieTcK).toFixed(2) : "") + "</td><td>" + escapeHtml(r.synagonia || "") + "</td><td>" + escapeHtml(r.source || "") + "</td><td>" + escapeHtml(r.comment || "") + "</td><td>" + escapeHtml(r.createdAt || "") + "</td></tr>";
      });
      wrap.innerHTML = html + "</tbody></table>";
    }

    function renderClassifyTable(list) {
      const wrap = document.getElementById("classify-table-wrap");
      if (!list || list.length === 0) {
        wrap.innerHTML = "<p class=\"msg info\">Записей пока нет.</p>";
        return;
      }
      let html = "<table><thead><tr><th>Формула</th><th>Тип магнетизма</th><th>Дата</th></tr></thead><tbody>";
      list.forEach((r) => {
        html += "<tr><td>" + escapeHtml(r.formula) + "</td><td>" + escapeHtml(r.magneticClass || "") + "</td><td>" + escapeHtml(r.createdAt || "") + "</td></tr>";
      });
      wrap.innerHTML = html + "</tbody></table>";
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    async function loadData() {
      const msgEl = document.getElementById("message");
      msgEl.style.display = "none";
      try {
        const [labelsRes, classRes] = await Promise.all([
          fetch("/api/labels", fetchOpts),
          fetch("/api/classifications", fetchOpts)
        ]);
        if (labelsRes.status === 401 || labelsRes.status === 403) {
          showMsg("Войдите под учётной записью администратора.", "error");
          document.getElementById("labels-table-wrap").innerHTML = "<p><a href=\"/\">Перейти на главную</a> и войти.</p>";
          document.getElementById("classify-table-wrap").innerHTML = "";
          return;
        }
        if (!labelsRes.ok) {
          showMsg("Ошибка загрузки разметки.", "error");
          return;
        }
        const labelsData = await labelsRes.json().catch(() => ({}));
        renderLabelsTable(labelsData.labels || []);

        if (!classRes.ok) {
          document.getElementById("classify-table-wrap").innerHTML = "<p class=\"msg info\">Не удалось загрузить классификации.</p>";
        } else {
          const classData = await classRes.json().catch(() => ({}));
          renderClassifyTable(classData.classifications || []);
        }
      } catch (e) {
        showMsg("Ошибка сети.", "error");
      }
    }

    document.getElementById("btn-refresh").addEventListener("click", loadData);

    // Скачивание: прямая ссылка с download — браузер сам отправит cookie и получит файл (Content-Disposition на сервере).
    function downloadCsvByLink(url, filename) {
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      setTimeout(() => document.body.removeChild(a), 150);
    }

    document.getElementById("btn-download-labels-csv").addEventListener("click", () => {
      downloadCsvByLink("/api/labels?format=csv", "user_labels.csv");
    });

    document.getElementById("btn-download-classify-csv").addEventListener("click", () => {
      downloadCsvByLink("/api/classifications?format=csv", "user_classifications.csv");
    });

    loadData();

    // Тема: тот же ключ, что на главной (curie-theme). Читаем при загрузке и даём переключатель.
    const THEME_KEY = "curie-theme";
    function applyAdminTheme(theme) {
      document.body.classList.toggle("theme-dark", theme === "dark");
      document.body.classList.toggle("theme-light", theme === "light");
      const btn = document.getElementById("admin-theme-toggle");
      if (btn) btn.textContent = theme === "dark" ? "☀️" : "🌙";
    }
    (function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      const theme = (saved === "light" || saved === "dark") ? saved : "dark";
      applyAdminTheme(theme);
    })();
    document.getElementById("admin-theme-toggle").addEventListener("click", () => {
      const isDark = document.body.classList.contains("theme-dark");
      const next = isDark ? "light" : "dark";
      localStorage.setItem(THEME_KEY, next);
      applyAdminTheme(next);
    });
  </script>
</body>
</html>
