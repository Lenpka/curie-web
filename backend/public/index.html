<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Curie T₍C₎ predictor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #7e92c0;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .app {
      width: 100%;
      max-width: 720px;
      padding: 24px 16px 40px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title {
      font-size: 44px;
      font-weight: 800;
      display: flex;
      justify-content: center;
      gap: 8px;
      align-items: center;
    }
    .subtitle {
      font-size: 26px;
      color: #b11402;
      margin-bottom: 30px;
      justify-content: center;
    }
    .lang-toggle button {
      background: transparent;
      border: 3px solid #4b5563;
      color: #9ca3af;
      padding: 8px 20px;
      justify-content: center;
      margin-left: 8px;
      border-radius: 999px;
      font-size: 24px;
      cursor: pointer;
    }
    .lang-toggle button.active {
      background: #f97316;
      border-color: #f97316;
      color: #111827;
      justify-content: center;
    }
    .card {
      background: #020617;
      border-radius: 18px;
      padding: 30px 30px 32px;
      border: 2px solid #1e293b;
      box-shadow: 0 30px 68px rgba(15,23,42,0.8);
    }
    label {
      display: block;
      font-size: 34px;
      margin-bottom: 8px;
      color: #e5e7eb;
      justify-content: center;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      padding: 16px 20px;
      border-radius: 15px;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-size: 26px;
      
    }
    textarea::placeholder { color: #6b7280; }
    .hint {
      font-size: 24px;
      color: #6b7280;
      margin-top: 4px;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    button.primary {
      background: #f97316;
      border: none;
      color: #111827;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 28px;
      font-weight: 600;
      cursor: pointer;
      justify-content: center;
    }
    button.primary:disabled {
      opacity: 0.6;
      cursor: default;
      justify-content: center;
    }
    .status {
      font-size: 24px;
      color: #9ca3af;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 26px;
    }
    th, td {
      padding: 12px 16px;
      text-align: left;
    }
    th {
      border-bottom: 1px solid #1f2937;
      color: #9ca3af;
      font-weight: 500;
    }
    tr:nth-child(even) td {
      background: rgba(15,23,42,0.6);
    }
    .formula-col { width: 45%; }
    .tc-col { width: 27%; }
    .tc-deg-col { width: 28%; }
    .error { color: #fca5a5; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="app">
    <!-- HEADER + LANGUAGE TOGGLE: заголовок страницы и переключатель RU/EN -->
    <header>
      <div>
        <div class="title">
          <span>🧲</span>
          <span id="title-text">Предсказание температуры Кюри</span>
        </div>
        <div class="subtitle" id="subtitle-text">
          Введите формулы (по одной на строку) и получите оценку T<sub>C</sub> в K и °C
        </div>
      </div>
      <div class="lang-toggle">
        <button data-lang="ru" class="active">RU</button>
        <button data-lang="en">EN</button>
      </div>
    </header>

    <!-- MAIN CARD: ввод формул, кнопка предсказания и таблица результатов -->
    <div class="card">
      <label for="formulas" id="label-formulas">Формулы</label>
      <textarea id="formulas" placeholder="Fe3O4&#10;Nd2Fe14B&#10;CoFe2O4"></textarea>
      <div class="hint" id="hint-text">
        Одна формула на строку. Пустые строки и строки, начинающиеся с #, игнорируются.
      </div>

      <div class="actions">
        <button class="primary" id="btn-predict">Предсказать T<sub>C</sub></button>
        <div class="status" id="status"></div>
      </div>
      <div class="error" id="error"></div>

      <table id="results-table" style="display:none;">
        <thead>
          <tr>
            <th class="formula-col" id="th-formula">Формула</th>
            <th class="tc-col" id="th-tc-k">T<sub>C</sub> (K)</th>
            <th class="tc-deg-col" id="th-tc-c">T<sub>C</sub> (°C)</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>

    <!-- LABEL CARD: форма для отправки пользовательской разметки -->
    <div class="card" style="margin-top: 32px;">
      <h2 id="label-card-title" style="margin-top: 0; margin-bottom: 12px; font-size: 22px;">
        Добавить разметку (T<sub>C</sub>, сингония, источник)
      </h2>

      <!-- Формула -->
      <div style="margin-bottom: 10px;">
        <label id="label-formula-label" for="label-formula">Формула *</label>
        <input
          id="label-formula"
          type="text"
          placeholder="Fe3O4, Nd2Fe14B"
          style="width: 100%; padding: 6px 8px; border-radius: 8px; border: 1px solid #1f2937;"
        />
      </div>

      <!-- Температура Кюри + единицы -->
      <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <div style="flex: 1;">
          <label id="label-tc-label" for="label-tc-value">Температура Кюри *</label>
          <input
            id="label-tc-value"
            type="number"
            step="0.1"
            min="0"
            max="2000"
            placeholder="Например, 785"
            style="width: 100%; padding: 6px 8px; border-radius: 8px; border: 1px solid #1f2937;"
          />
        </div>
        <div style="width: 120px;">
          <label id="label-tc-unit-label" for="label-tc-unit">Единицы</label>
          <select
            id="label-tc-unit"
            style="width: 100%; padding: 6px 8px; border-radius: 8px; border: 1px solid #1f2937;"
          >
            <option value="K">K</option>
            <option value="C">°C</option>
          </select>
        </div>
      </div>

      <!-- Константа анизотропии -->
      <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <div style="flex: 1;">
          <label id="label-aniso-label" for="label-aniso">Константа анизотропии (МДж/м³)</label>
          <input
            id="label-aniso"
            type="number"
            step="0.01"
            min="0"
            max="100"
            placeholder="Например, 0.85"
            style="width: 100%; padding: 6px 8px; border-radius: 8px; border: 1px solid #1f2937;"
          />
        </div>
      </div>

      <!-- Сингония -->
      <div style="margin-bottom: 10px;">
        <label id="label-syn-label" for="label-syn">Сингония (необязательно)</label>
        <select
          id="label-syn"
          style="width: 100%; padding: 6px 8px; border-radius: 8px; border: 1px solid #1f2937;"
        >
          <option value="">— не указано —</option>
          <option value="триклинная">триклинная</option>
          <option value="моноклинная">моноклинная</option>
          <option value="ромбическая">ромбическая</option>
          <option value="тетрагональная">тетрагональная</option>
          <option value="гексагональная">гексагональная</option>
          <option value="ромбоэдрическая">ромбоэдрическая</option>
          <option value="кубическая">кубическая</option>
        </select>
      </div>

      <!-- Источник -->
      <div style="margin-bottom: 10px;">
        <label id="label-source-label" for="label-source">Источник (статья, DOI, база)</label>
        <input
          id="label-source"
          type="text"
          placeholder="Например, DOI:10.1234/..."
          style="width: 100%; padding: 6px 8px; border-radius: 8px; border: 1px solid #1f2937;"
        />
      </div>

      <!-- Комментарий -->
      <div style="margin-bottom: 10px;">
        <label id="label-comment-label" for="label-comment">Комментарий</label>
        <textarea
          id="label-comment"
          rows="2"
          placeholder="Дополнительные примечания, условия измерений и т.д."
          style="width: 100%; padding: 6px 8px; border-radius: 8px; border: 1px solid #1f2937;"
        ></textarea>
      </div>

      <!-- Кнопка и статус -->
      <div class="actions">
        <button class="primary" id="btn-label">Отправить разметку</button>
        <div class="status" id="label-status"></div>
      </div>
      <div class="error" id="label-error"></div>
    </div>

  </div>

  <!-- APP LOGIC: переводы, работа с DOM и запросы к backend -->
  <script src="/app.js"></script>
</body>
</html>
