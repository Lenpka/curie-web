<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Curie T₍C₎ predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-input: #0f172a;
      --border: #334155;
      --border-focus: #38bdf8;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #0ea5e9;
      --accent-hover: #38bdf8;
      --error: #f87171;
      --radius: 12px;
      --radius-lg: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.25);
      --shadow-card: 0 8px 32px rgba(0,0,0,0.35);
    }
    body {
      margin: 0;
      font-family: "Outfit", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(14, 165, 233, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(56, 189, 248, 0.08), transparent);
      display: flex;
      justify-content: center;
      padding: 24px 16px 48px;
    }
    .app {
      width: 100%;
      max-width: 680px;
    }
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .title {
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .title span:first-child { font-size: 1.4em; }
    .subtitle {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--text-muted);
      margin-top: 6px;
      margin-bottom: 0;
      line-height: 1.5;
      max-width: 420px;
    }
    .lang-toggle {
      display: flex;
      gap: 6px;
    }
    .lang-toggle button {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .lang-toggle button:hover {
      background: #334155;
      color: var(--text);
      /* border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: var(--radius);
      font-family: Tahoma;
      font-size: 0.9rem;
      font-weight: 400;
      cursor: pointer; */

    }
    .lang-toggle button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 28px 24px 32px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
    }
    .card + .card { margin-top: 24px; }
    .card label {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    .card-main label[for="formulas"] { font-size: 1.15rem; }
    textarea, input[type="text"], input[type="number"], select {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-input);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    textarea::placeholder,
    input::placeholder { color: var(--text-muted); opacity: 0.8; }
    textarea:focus, input:focus, select:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }
    .hint {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.4;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    button.primary {
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button.primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    button.primary:active:not(:disabled) { transform: scale(0.98); }
    button.primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .error {
      color: var(--error);
      font-size: 0.9rem;
      margin-top: 10px;
      line-height: 1.4;
    }
    #results-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 0.95rem;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    #results-table th,
    #results-table td {
      padding: 12px 16px;
      text-align: left;
    }
    #results-table th {
      background: var(--bg-input);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    #results-table tbody tr {
      border-top: 1px solid var(--border);
      transition: background 0.15s;
    }
    #results-table tbody tr:hover { background: rgba(15, 23, 42, 0.6); }
    #results-table td { color: var(--text); }
    .formula-col { width: 50%; }
    .tc-col, .tc-deg-col { width: 25%; }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 16px 0;
      color: var(--text);
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; min-width: 0; margin-bottom: 0; }
    .form-row .form-group--unit { flex: 0 0 100px; }
  </style>
</head>
<body>
  <div class="app">

    <!-- HEADER + LANGUAGE TOGGLE: заголовок страницы и переключатель RU/EN -->
    <header>
      <div>
        <div class="title">
          <span>🧲</span>
          <span id="title-text">Предсказание температуры Кюри</span>
        </div>
        <div class="subtitle" id="subtitle-text">
          Введите формулы (по одной на строку) и получите оценку T<sub>C</sub> в K и °C
        </div>
      </div>

      <div class="header-controls">
        
        <div class="lang-toggle">
          <button data-lang="ru" class="active">RU</button>
          <button data-lang="en">EN</button>
        </div>

        
        <button id = "theme-toggle" class="theme-toggle" title="Сменить тему">
          🌙
        </button>
    </div>
    </header>



    <!-- MAIN CARD: ввод формул, кнопка предсказания и таблица результатов -->
    <div class="card card-main">
      <label for="formulas" id="label-formulas">Формулы</label>
      <textarea id="formulas" placeholder="Fe3O4&#10;Nd2Fe14B&#10;CoFe2O4"></textarea>
      <div class="hint" id="hint-text">
        Одна формула на строку. Пустые строки и строки, начинающиеся с #, игнорируются.
      </div>
          <!-- Предсказать -->
      <div class="actions">
        <button class="primary" id="btn-predict">Предсказать T<sub>C</sub></button>
        <div class="status" id="status"></div>
      </div>
      <div class="error" id="error"></div>


      <!-- Результаты -->
      <table id="results-table" style="display:none;">
        <thead>
          <tr>
            <th class="formula-col" id="th-formula">Формула</th>
            <th class="tc-col" id="th-tc-k">T<sub>C</sub> (K)</th>
            <th class="tc-deg-col" id="th-tc-c">T<sub>C</sub> (°C)</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>





    <!-- LABEL CARD: форма для отправки пользовательской разметки -->
    <div class="card">
      <h2 id="label-card-title">Добавить разметку (T<sub>C</sub>, сингония, источник)</h2>

      <div class="form-group">
        <label id="label-formula-label" for="label-formula">Формула *</label>
        <input id="label-formula" type="text" placeholder="Fe3O4, Nd2Fe14B" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label id="label-tc-label" for="label-tc-value">Температура Кюри *</label>
          <input
            id="label-tc-value"
            type="number"
            step="0.1"
            min="0"
            max="2000"
            placeholder="Например, 785"
          />
        </div>
        <div class="form-group form-group--unit">
          <label id="label-tc-unit-label" for="label-tc-unit">Единицы</label>
          <select id="label-tc-unit">
            <option value="K">K</option>
            <option value="C">°C</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label id="label-aniso-label" for="label-aniso">Константа анизотропии (МДж/м³)</label>
        <input
          id="label-aniso"
          type="number"
          step="0.01"
          min="0"
          max="100"
          placeholder="Например, 0.85"
        />
      </div>

      <div class="form-group">
        <label id="label-syn-label" for="label-syn">Сингония (необязательно)</label>
        <select id="label-syn">
          <option value="">— не указано —</option>
          <option value="триклинная">триклинная</option>
          <option value="моноклинная">моноклинная</option>
          <option value="ромбическая">ромбическая</option>
          <option value="тетрагональная">тетрагональная</option>
          <option value="гексагональная">гексагональная</option>
          <option value="ромбоэдрическая">ромбоэдрическая</option>
          <option value="кубическая">кубическая</option>
        </select>
      </div>

      <div class="form-group">
        <label id="label-source-label" for="label-source">Источник (статья, DOI, база)</label>
        <input id="label-source" type="text" placeholder="Например, DOI:10.1234/..." />
      </div>

      <div class="form-group">
        <label id="label-comment-label" for="label-comment">Комментарий</label>
        <textarea id="label-comment" rows="2" placeholder="Дополнительные примечания, условия измерений и т.д."></textarea>
      </div>

      <div class="actions">
        <button class="primary" id="btn-label">Отправить разметку</button>
        <div class="status" id="label-status"></div>
      </div>
      <div class="error" id="label-error"></div>
    </div>

  </div>

  <!-- APP LOGIC: переводы, работа с DOM и запросы к backend -->
  <script src="/app.js"></script>
</body>
</html>
